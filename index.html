<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>能源动力保研信息追踪</title>
  <style>
    :root {
      --bg: #f6f8f7;
      --panel: #ffffff;
      --ink: #17211f;
      --muted: #65706d;
      --line: #dfe7e3;
      --accent: #0f766e;
      --accent-2: #b45309;
      --danger: #b42318;
      --soft: #e8f4f1;
      --soft-2: #fff4df;
      --shadow: 0 16px 42px rgba(24, 38, 34, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      letter-spacing: 0;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .topbar {
      background: #17332f;
      color: #f7fbfa;
      border-bottom: 4px solid #d69833;
    }

    .topbar-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 26px 20px 24px;
      display: grid;
      gap: 18px;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: #b9d7d1;
      font-size: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 48px);
      line-height: 1.12;
      font-weight: 800;
    }

    .subtitle {
      margin: 12px 0 0;
      color: #d8e7e4;
      max-width: 720px;
      line-height: 1.7;
    }

    .update-badge {
      min-width: 210px;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      text-align: right;
      color: #eaf5f2;
      background: rgba(255, 255, 255, 0.06);
    }

    .update-badge span {
      display: block;
      color: #b9d7d1;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .layout {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 20px 48px;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 22px;
    }

    .sidebar {
      position: sticky;
      top: 16px;
      align-self: start;
      display: grid;
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel-inner {
      padding: 16px;
    }

    .panel-title {
      margin: 0 0 12px;
      font-size: 15px;
      color: var(--muted);
      font-weight: 700;
    }

    .stats {
      display: grid;
      gap: 10px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 34px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }

    .stat:last-child {
      border-bottom: 0;
    }

    .stat strong {
      font-size: 18px;
    }

    .school-nav {
      display: grid;
      gap: 2px;
      max-height: 58vh;
      overflow: auto;
      padding-right: 4px;
    }

    .school-nav a {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      color: var(--ink);
      font-size: 14px;
    }

    .school-nav a:hover {
      background: var(--soft);
      text-decoration: none;
    }

    .school-nav span {
      color: var(--muted);
    }

    .main {
      min-width: 0;
      display: grid;
      gap: 18px;
    }

    .controls {
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    .control-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 180px 160px;
      gap: 12px;
    }

    input,
    select,
    button {
      font: inherit;
    }

    input,
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
    }

    input:focus,
    select:focus,
    button:focus-visible {
      outline: 3px solid rgba(15, 118, 110, 0.18);
      border-color: var(--accent);
    }

    .segmented {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .segmented button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      cursor: pointer;
    }

    .segmented button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .school-section {
      scroll-margin-top: 18px;
    }

    .school-heading {
      margin: 0 0 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 22px;
    }

    .school-heading small {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    .notice-list {
      display: grid;
      gap: 10px;
    }

    .notice {
      display: grid;
      grid-template-columns: 164px minmax(0, 1fr) 90px;
      gap: 14px;
      align-items: start;
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      border-radius: 8px;
    }

    .notice.closed {
      border-left-color: #9aa5a1;
      opacity: 0.72;
    }

    .notice.soon {
      border-left-color: var(--accent-2);
    }

    .notice.unknown {
      border-left-color: #596579;
    }

    .deadline {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: max-content;
      min-height: 26px;
      padding: 0 9px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--accent);
      font-weight: 700;
      font-size: 12px;
      white-space: nowrap;
    }

    .badge.soon {
      background: var(--soft-2);
      color: var(--accent-2);
    }

    .badge.closed {
      background: #eef1f0;
      color: #66716d;
    }

    .badge.unknown {
      background: #edf1f7;
      color: #596579;
    }

    .notice-title {
      margin: 0 0 8px;
      font-size: 17px;
      line-height: 1.45;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .note {
      margin: 8px 0 0;
      color: #3f4b48;
      font-size: 14px;
      line-height: 1.6;
    }

    .priority {
      justify-self: end;
      min-width: 52px;
      min-height: 28px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #f4efe7;
      color: #8a4b11;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .priority.high {
      background: #fae8e6;
      color: var(--danger);
    }

    .empty {
      padding: 28px 18px;
      text-align: center;
      color: var(--muted);
      background: #fff;
      border: 1px dashed var(--line);
      border-radius: 8px;
    }

    .footer {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      padding: 6px 2px 0;
    }

    @media (max-width: 920px) {
      .topbar-inner,
      .layout {
        grid-template-columns: 1fr;
      }

      .update-badge {
        text-align: left;
      }

      .sidebar {
        position: static;
      }

      .school-nav {
        max-height: 190px;
      }

      .control-row,
      .notice {
        grid-template-columns: 1fr;
      }

      .priority {
        justify-self: start;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div>
        <p class="eyebrow">个人信息追踪页</p>
        <h1>能源动力保研信息追踪</h1>
        <p class="subtitle">按学校整理夏令营、预推免和九推通知，自动识别截止时间，支持搜索、筛选和优先级标记。</p>
      </div>
      <div class="update-badge">
        <span>数据来源</span>
        Google Sheets / data.csv
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <section class="panel">
        <div class="panel-inner">
          <h2 class="panel-title">概览</h2>
          <div class="stats">
            <div class="stat"><span>全部通知</span><strong id="totalCount">0</strong></div>
            <div class="stat"><span>未截止</span><strong id="openCount">0</strong></div>
            <div class="stat"><span>7 天内截止</span><strong id="soonCount">0</strong></div>
            <div class="stat"><span>已截止</span><strong id="closedCount">0</strong></div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-inner">
          <h2 class="panel-title">学校目录</h2>
          <nav class="school-nav" id="schoolNav"></nav>
        </div>
      </section>
    </aside>

    <main class="main">
      <section class="panel controls">
        <div class="control-row">
          <input id="searchInput" type="search" placeholder="搜索学校、学院、备注或城市">
          <select id="categorySelect" aria-label="按类型筛选">
            <option value="all">全部类型</option>
          </select>
          <select id="sortSelect" aria-label="排序方式">
            <option value="deadline">按截止时间</option>
            <option value="school">按学校名称</option>
            <option value="priority">按优先级</option>
          </select>
        </div>
        <div class="segmented" id="statusButtons" aria-label="按状态筛选">
          <button type="button" class="active" data-filter="all">全部</button>
          <button type="button" data-filter="open">未截止</button>
          <button type="button" data-filter="soon">7 天内截止</button>
          <button type="button" data-filter="closed">已截止</button>
          <button type="button" data-filter="unknown">未公布时间</button>
        </div>
        <p class="hint">更新方法：设置 Google Sheets 发布链接后，只需要在线修改表格；如果没有设置链接，页面会读取同文件夹下的 data.csv。</p>
      </section>

      <section id="content"></section>

      <p class="footer">这个页面是静态网页模板，可以直接部署到 GitHub Pages、Netlify 或 Vercel。公开发布前请确认链接来源、截止时间和招生要求。</p>
    </main>
  </div>

  <script>
    const GOOGLE_SHEET_CSV_URL = "";

    const fallbackCsv = `school,program,category,deadline,link,city,priority,note
清华大学,核能与新能源技术研究院,夏令营,2026-06-24 17:00,https://www.inet.tsinghua.edu.cn/info/1288/3179.htm,北京,高,能源动力相关
南京大学,能源与资源学院,夏令营,2026-06-26 23:59,https://sser.nju.edu.cn/info/1012/4511.htm,南京,高,能源资源方向
中国科学技术大学,能源科学与技术学院,夏令营,2026-06-30 23:59,https://xspt.ustc.edu.cn/logon,合肥,高,系统报名入口`;

    const state = {
      records: [],
      status: "all",
      category: "all",
      search: "",
      sort: "deadline"
    };

    const els = {
      content: document.querySelector("#content"),
      schoolNav: document.querySelector("#schoolNav"),
      search: document.querySelector("#searchInput"),
      category: document.querySelector("#categorySelect"),
      sort: document.querySelector("#sortSelect"),
      statusButtons: document.querySelector("#statusButtons"),
      total: document.querySelector("#totalCount"),
      open: document.querySelector("#openCount"),
      soon: document.querySelector("#soonCount"),
      closed: document.querySelector("#closedCount")
    };

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let quoted = false;
      const cleanText = text.replace(/^\uFEFF/, "");

      for (let i = 0; i < cleanText.length; i += 1) {
        const char = cleanText[i];
        const next = cleanText[i + 1];

        if (char === '"' && quoted && next === '"') {
          cell += '"';
          i += 1;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (char === "," && !quoted) {
          row.push(cell.trim());
          cell = "";
        } else if ((char === "\n" || char === "\r") && !quoted) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(cell.trim());
          if (row.some(Boolean)) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      row.push(cell.trim());
      if (row.some(Boolean)) rows.push(row);

      const headers = rows.shift() || [];
      return rows.map((values) => {
        const item = {};
        headers.forEach((header, index) => {
          item[header] = values[index] || "";
        });
        return item;
      });
    }

    function parseDeadline(value) {
      const raw = (value || "").trim();
      if (!raw || raw.toUpperCase() === "N/A") return null;
      const normalized = raw.replace(/\//g, "-").replace(" ", "T");
      const date = new Date(normalized);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function getStatus(item) {
      if (!item.deadlineDate) return "unknown";
      const now = new Date();
      const diff = item.deadlineDate.getTime() - now.getTime();
      const days = diff / (1000 * 60 * 60 * 24);
      if (diff < 0) return "closed";
      if (days <= 7) return "soon";
      return "open";
    }

    function deadlineText(item) {
      if (!item.deadlineDate) return "时间待公布";
      const diff = item.deadlineDate.getTime() - new Date().getTime();
      if (diff < 0) return "已截止";
      const hours = Math.ceil(diff / (1000 * 60 * 60));
      if (hours < 24) return `${hours} 小时内截止`;
      return `${Math.ceil(hours / 24)} 天后截止`;
    }

    function formatDate(date) {
      if (!date) return "N/A";
      const pad = (num) => String(num).padStart(2, "0");
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function normalize(records) {
      return records
        .filter((item) => item.school && item.program)
        .map((item) => {
          const deadlineDate = parseDeadline(item.deadline);
          const normalized = {
            school: item.school.trim(),
            program: item.program.trim(),
            category: item.category.trim() || "未分类",
            deadline: item.deadline.trim(),
            link: item.link.trim(),
            city: item.city.trim(),
            priority: item.priority.trim() || "中",
            note: item.note.trim(),
            deadlineDate
          };
          normalized.status = getStatus(normalized);
          return normalized;
        });
    }

    function priorityRank(value) {
      return { "高": 0, "中": 1, "低": 2 }[value] ?? 3;
    }

    function statusLabel(status) {
      return {
        open: "未截止",
        soon: "临近截止",
        closed: "已截止",
        unknown: "待公布"
      }[status] || "未截止";
    }

    function matchesStatus(item) {
      if (state.status === "all") return true;
      if (state.status === "open") return item.status === "open" || item.status === "soon";
      return item.status === state.status;
    }

    function getFilteredRecords() {
      const keyword = state.search.trim().toLowerCase();
      const filtered = state.records.filter((item) => {
        const haystack = `${item.school} ${item.program} ${item.category} ${item.city} ${item.priority} ${item.note}`.toLowerCase();
        const matchSearch = !keyword || haystack.includes(keyword);
        const matchCategory = state.category === "all" || item.category === state.category;
        return matchSearch && matchCategory && matchesStatus(item);
      });

      return filtered.sort((a, b) => {
        if (state.sort === "school") return a.school.localeCompare(b.school, "zh-Hans-CN");
        if (state.sort === "priority") return priorityRank(a.priority) - priorityRank(b.priority);
        const aTime = a.deadlineDate ? a.deadlineDate.getTime() : Number.MAX_SAFE_INTEGER;
        const bTime = b.deadlineDate ? b.deadlineDate.getTime() : Number.MAX_SAFE_INTEGER;
        return aTime - bTime;
      });
    }

    function groupBySchool(records) {
      return records.reduce((groups, item) => {
        if (!groups.has(item.school)) groups.set(item.school, []);
        groups.get(item.school).push(item);
        return groups;
      }, new Map());
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function anchorId(name) {
      return `school-${encodeURIComponent(name).replace(/%/g, "")}`;
    }

    function renderStats() {
      els.total.textContent = state.records.length;
      els.open.textContent = state.records.filter((item) => item.status === "open" || item.status === "soon").length;
      els.soon.textContent = state.records.filter((item) => item.status === "soon").length;
      els.closed.textContent = state.records.filter((item) => item.status === "closed").length;
    }

    function renderCategories() {
      const categories = Array.from(new Set(state.records.map((item) => item.category))).sort((a, b) => a.localeCompare(b, "zh-Hans-CN"));
      els.category.innerHTML = `<option value="all">全部类型</option>${categories.map((category) => `<option value="${escapeHtml(category)}">${escapeHtml(category)}</option>`).join("")}`;
    }

    function render() {
      const records = getFilteredRecords();
      const groups = groupBySchool(records);

      if (!records.length) {
        els.content.innerHTML = `<div class="empty">没有找到符合条件的信息。可以换个关键词，或者检查 data.csv 是否已经保存。</div>`;
        els.schoolNav.innerHTML = "";
        return;
      }

      els.schoolNav.innerHTML = Array.from(groups.entries()).map(([school, items]) => {
        return `<a href="#${anchorId(school)}">${escapeHtml(school)} <span>${items.length}</span></a>`;
      }).join("");

      els.content.innerHTML = Array.from(groups.entries()).map(([school, items]) => {
        const list = items.map((item) => {
          const priorityClass = item.priority === "高" ? "high" : "";
          const link = item.link
            ? `<a href="${escapeHtml(item.link)}" target="_blank" rel="noopener">${escapeHtml(item.program)}</a>`
            : escapeHtml(item.program);
          return `
            <article class="notice ${item.status}">
              <div class="deadline">
                <span class="badge ${item.status}">${statusLabel(item.status)}</span>
                <span>${escapeHtml(formatDate(item.deadlineDate))}</span>
                <strong>${escapeHtml(deadlineText(item))}</strong>
              </div>
              <div>
                <h3 class="notice-title">${link}</h3>
                <div class="meta">
                  <span>${escapeHtml(item.category)}</span>
                  ${item.city ? `<span>${escapeHtml(item.city)}</span>` : ""}
                </div>
                ${item.note ? `<p class="note">${escapeHtml(item.note)}</p>` : ""}
              </div>
              <span class="priority ${priorityClass}">${escapeHtml(item.priority)}</span>
            </article>
          `;
        }).join("");

        return `
          <section class="school-section" id="${anchorId(school)}">
            <h2 class="school-heading">${escapeHtml(school)} <small>${items.length} 条</small></h2>
            <div class="notice-list">${list}</div>
          </section>
        `;
      }).join("");
    }

    function bindEvents() {
      els.search.addEventListener("input", (event) => {
        state.search = event.target.value;
        render();
      });

      els.category.addEventListener("change", (event) => {
        state.category = event.target.value;
        render();
      });

      els.sort.addEventListener("change", (event) => {
        state.sort = event.target.value;
        render();
      });

      els.statusButtons.addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (!button) return;
        state.status = button.dataset.filter;
        els.statusButtons.querySelectorAll("button").forEach((item) => item.classList.toggle("active", item === button));
        render();
      });
    }

    async function loadData() {
      const sources = [GOOGLE_SHEET_CSV_URL.trim(), "data.csv"].filter(Boolean);

      for (const source of sources) {
        try {
          const response = await fetch(source, { cache: "no-store" });
          if (!response.ok) throw new Error(`${source} not found`);
          const text = await response.text();
          if (!text.trim() || text.trim().startsWith("<!DOCTYPE")) throw new Error(`${source} is not CSV`);
          return text;
        } catch (error) {
          console.warn(`Cannot load ${source}`, error);
        }
      }

      return fallbackCsv;
    }

    async function init() {
      const csv = await loadData();
      state.records = normalize(parseCsv(csv));
      renderStats();
      renderCategories();
      bindEvents();
      render();
    }

    init();
  </script>
</body>
</html>
