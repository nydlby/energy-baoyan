<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>能源动力保研信息追踪</title>
  <style>
    :root {
      --bg: #f7f8f7;
      --ink: #26302e;
      --muted: #67726f;
      --line: #dfe5e3;
      --line-strong: #c7d1ce;
      --accent: #0f766e;
      --accent-dark: #17332f;
      --warn: #a16207;
      --danger: #b42318;
      --panel: #ffffff;
      --soft: #edf6f4;
      --warn-soft: #fff7e6;
      --danger-soft: #fff0ee;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    a {
      color: #3f4a48;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    a:hover {
      color: var(--accent);
    }

    .topbar {
      background: var(--accent-dark);
      border-bottom: 4px solid #d69833;
      color: #f7fbfa;
    }

    .topbar-inner {
      max-width: 980px;
      margin: 0 auto;
      padding: 30px 20px 28px;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: #b9d7d1;
      font-size: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 46px);
      line-height: 1.12;
      font-weight: 800;
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 20px 56px;
    }

    .toolbar {
      display: grid;
      gap: 12px;
      padding: 16px;
      margin-bottom: 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .toolbar-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 150px 150px;
      gap: 10px;
    }

    input,
    select,
    button {
      font: inherit;
    }

    input,
    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 0 11px;
    }

    input:focus,
    select:focus,
    button:focus-visible {
      outline: 3px solid rgba(15, 118, 110, 0.16);
      border-color: var(--accent);
    }

    .status-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .status-tabs button {
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 0 11px;
      cursor: pointer;
    }

    .status-tabs button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .summary strong {
      color: var(--ink);
    }

    .school-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 20px;
    }

    .school-nav a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
      font-size: 14px;
      text-decoration: none;
    }

    .school-nav a:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .school-nav span {
      color: var(--muted);
      font-size: 13px;
    }

    .school-section {
      scroll-margin-top: 16px;
      margin: 22px 0 0;
    }

    .school-heading {
      margin: 0 0 10px;
      color: #4a4541;
      font-size: 26px;
      line-height: 1.2;
      font-weight: 800;
    }

    .school-heading small {
      margin-left: 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
    }

    .notice-list {
      display: grid;
      gap: 6px;
      border-left: 5px solid #d9dddc;
      padding-left: 12px;
    }

    .notice-row {
      display: grid;
      grid-template-columns: minmax(210px, auto) minmax(0, 1fr) auto;
      gap: 10px;
      align-items: baseline;
      min-height: 36px;
      padding: 5px 0;
      border-bottom: 1px solid rgba(223, 229, 227, 0.7);
      line-height: 1.6;
    }

    .notice-row:last-child {
      border-bottom: 0;
    }

    .deadline-text {
      color: #4d5755;
      font-size: 18px;
      white-space: nowrap;
    }

    .deadline-text.soon {
      color: var(--warn);
      font-weight: 700;
    }

    .deadline-text.closed {
      color: #737d7a;
    }

    .deadline-text.unknown {
      color: #566782;
    }

    .program-link {
      color: #4d5755;
      font-size: 18px;
      overflow-wrap: anywhere;
    }

    .program-link:hover {
      color: var(--accent);
    }

    .meta {
      display: inline-flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: #eef2f1;
      color: #596461;
      white-space: nowrap;
    }

    .tag.high {
      background: var(--danger-soft);
      color: var(--danger);
      font-weight: 700;
    }

    .tag.medium {
      background: var(--warn-soft);
      color: var(--warn);
    }

    .note {
      grid-column: 2 / -1;
      margin: -3px 0 2px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .empty,
    .error-box {
      padding: 24px 18px;
      color: var(--muted);
      background: #fff;
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      line-height: 1.75;
    }

    .error-box {
      border-color: #efb4ae;
      background: #fff8f7;
      color: #6f2a22;
    }

    .error-box strong {
      color: var(--danger);
    }

    code {
      background: #eef4f2;
      border-radius: 5px;
      padding: 2px 5px;
      color: #24544d;
    }

    @media (max-width: 760px) {
      .topbar-inner {
        padding: 24px 18px 22px;
      }

      .page {
        padding: 18px 14px 44px;
      }

      .toolbar-row,
      .notice-row {
        grid-template-columns: 1fr;
      }

      .deadline-text,
      .program-link {
        font-size: 17px;
      }

      .meta {
        justify-content: flex-start;
      }

      .note {
        grid-column: auto;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <p class="eyebrow">个人信息追踪页</p>
      <h1>能源动力保研信息追踪</h1>
    </div>
  </header>

  <main class="page">
    <section class="toolbar">
      <div class="toolbar-row">
        <input id="searchInput" type="search" placeholder="搜索学校、学院、备注或城市">
        <select id="categorySelect" aria-label="按类型筛选">
          <option value="all">全部类型</option>
        </select>
        <select id="sortSelect" aria-label="排序方式">
          <option value="deadline">按截止时间</option>
          <option value="school">按学校名称</option>
          <option value="priority">按优先级</option>
        </select>
      </div>
      <div class="status-tabs" id="statusButtons" aria-label="按状态筛选">
        <button type="button" class="active" data-filter="all">全部</button>
        <button type="button" data-filter="open">未截止</button>
        <button type="button" data-filter="soon">7 天内截止</button>
        <button type="button" data-filter="closed">已截止</button>
        <button type="button" data-filter="unknown">未公布时间</button>
      </div>
      <div class="summary" id="summary">
        <span>全部 <strong id="totalCount">0</strong></span>
        <span>未截止 <strong id="openCount">0</strong></span>
        <span>7 天内 <strong id="soonCount">0</strong></span>
        <span>已截止 <strong id="closedCount">0</strong></span>
      </div>
    </section>

    <nav class="school-nav" id="schoolNav"></nav>

    <section id="content">
      <div class="empty">正在读取 data.csv...</div>
    </section>
  </main>

  <script>
    const DATA_FILE = "data.csv";
    const REQUIRED_HEADERS = ["school", "program", "category", "deadline", "link", "city", "priority", "note"];

    const state = {
      records: [],
      status: "all",
      category: "all",
      search: "",
      sort: "deadline"
    };

    const els = {
      content: document.querySelector("#content"),
      schoolNav: document.querySelector("#schoolNav"),
      search: document.querySelector("#searchInput"),
      category: document.querySelector("#categorySelect"),
      sort: document.querySelector("#sortSelect"),
      statusButtons: document.querySelector("#statusButtons"),
      total: document.querySelector("#totalCount"),
      open: document.querySelector("#openCount"),
      soon: document.querySelector("#soonCount"),
      closed: document.querySelector("#closedCount")
    };

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let quoted = false;
      const cleanText = text.replace(/^\uFEFF/, "");

      for (let i = 0; i < cleanText.length; i += 1) {
        const char = cleanText[i];
        const next = cleanText[i + 1];

        if (char === '"' && quoted && next === '"') {
          cell += '"';
          i += 1;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (char === "," && !quoted) {
          row.push(cell.trim());
          cell = "";
        } else if ((char === "\n" || char === "\r") && !quoted) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(cell.trim());
          if (row.some(Boolean)) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      row.push(cell.trim());
      if (row.some(Boolean)) rows.push(row);

      const headers = rows.shift() || [];
      const missing = REQUIRED_HEADERS.filter((header) => !headers.includes(header));
      if (missing.length) throw new Error(`data.csv 缺少表头：${missing.join(", ")}`);

      return rows.map((values) => {
        const item = {};
        headers.forEach((header, index) => {
          item[header] = values[index] || "";
        });
        return item;
      });
    }

    function parseDeadline(value) {
      const raw = (value || "").trim();
      if (!raw || raw.toUpperCase() === "N/A") return null;
      const normalized = raw.replace(/\//g, "-").replace(" ", "T");
      const date = new Date(normalized);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function getStatus(item) {
      if (!item.deadlineDate) return "unknown";
      const diff = item.deadlineDate.getTime() - Date.now();
      const days = diff / (1000 * 60 * 60 * 24);
      if (diff < 0) return "closed";
      if (days <= 7) return "soon";
      return "open";
    }

    function deadlineText(item) {
      if (!item.deadlineDate) return "暂无";
      const diff = item.deadlineDate.getTime() - Date.now();
      if (diff < 0) return "已截止";
      const minutes = Math.max(0, Math.floor(diff / (1000 * 60)));
      const days = Math.floor(minutes / (60 * 24));
      const hours = Math.floor((minutes / 60) % 24);
      const mins = minutes % 60;
      if (days > 0) return `${days} days ${hours} h ${mins} m`;
      if (hours > 0) return `${hours} h ${mins} m`;
      return `${mins} m`;
    }

    function normalize(records) {
      return records
        .filter((item) => item.school && item.program)
        .map((item) => {
          const normalized = {
            school: item.school.trim(),
            program: item.program.trim(),
            category: item.category.trim() || "未分类",
            deadline: item.deadline.trim(),
            link: item.link.trim(),
            city: item.city.trim(),
            priority: item.priority.trim() || "中",
            note: item.note.trim(),
            deadlineDate: parseDeadline(item.deadline)
          };
          normalized.status = getStatus(normalized);
          return normalized;
        });
    }

    function priorityRank(value) {
      return { "高": 0, "中": 1, "低": 2 }[value] ?? 3;
    }

    function matchesStatus(item) {
      if (state.status === "all") return true;
      if (state.status === "open") return item.status === "open" || item.status === "soon";
      return item.status === state.status;
    }

    function getFilteredRecords() {
      const keyword = state.search.trim().toLowerCase();
      const filtered = state.records.filter((item) => {
        const haystack = `${item.school} ${item.program} ${item.category} ${item.city} ${item.priority} ${item.note}`.toLowerCase();
        const matchSearch = !keyword || haystack.includes(keyword);
        const matchCategory = state.category === "all" || item.category === state.category;
        return matchSearch && matchCategory && matchesStatus(item);
      });

      return filtered.sort((a, b) => {
        if (state.sort === "school") return a.school.localeCompare(b.school, "zh-Hans-CN");
        if (state.sort === "priority") return priorityRank(a.priority) - priorityRank(b.priority);
        const aTime = a.deadlineDate ? a.deadlineDate.getTime() : Number.MAX_SAFE_INTEGER;
        const bTime = b.deadlineDate ? b.deadlineDate.getTime() : Number.MAX_SAFE_INTEGER;
        return aTime - bTime;
      });
    }

    function groupBySchool(records) {
      return records.reduce((groups, item) => {
        if (!groups.has(item.school)) groups.set(item.school, []);
        groups.get(item.school).push(item);
        return groups;
      }, new Map());
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function anchorId(name) {
      return `school-${encodeURIComponent(name).replace(/%/g, "")}`;
    }

    function renderStats() {
      els.total.textContent = state.records.length;
      els.open.textContent = state.records.filter((item) => item.status === "open" || item.status === "soon").length;
      els.soon.textContent = state.records.filter((item) => item.status === "soon").length;
      els.closed.textContent = state.records.filter((item) => item.status === "closed").length;
    }

    function renderCategories() {
      const categories = Array.from(new Set(state.records.map((item) => item.category)))
        .sort((a, b) => a.localeCompare(b, "zh-Hans-CN"));
      els.category.innerHTML = `<option value="all">全部类型</option>${categories.map((category) => `<option value="${escapeHtml(category)}">${escapeHtml(category)}</option>`).join("")}`;
    }

    function renderError(message) {
      renderStats();
      els.schoolNav.innerHTML = "";
      els.content.innerHTML = `
        <div class="error-box">
          <strong>没有成功读取 data.csv。</strong><br>
          ${escapeHtml(message)}<br>
          请确认 <code>index.html</code> 和 <code>data.csv</code> 都在 GitHub 仓库根目录。
        </div>
      `;
    }

    function priorityClass(priority) {
      if (priority === "高") return "high";
      if (priority === "中") return "medium";
      return "";
    }

    function render() {
      const records = getFilteredRecords();
      const groups = groupBySchool(records);

      if (!records.length) {
        els.content.innerHTML = `<div class="empty">没有找到符合条件的信息。</div>`;
        els.schoolNav.innerHTML = "";
        return;
      }

      els.schoolNav.innerHTML = Array.from(groups.entries()).map(([school, items]) => {
        return `<a href="#${anchorId(school)}">${escapeHtml(school)} <span>${items.length}</span></a>`;
      }).join("");

      els.content.innerHTML = Array.from(groups.entries()).map(([school, items]) => {
        const list = items.map((item) => {
          const link = item.link
            ? `<a class="program-link" href="${escapeHtml(item.link)}" target="_blank" rel="noopener">${escapeHtml(item.program)}</a>`
            : `<span class="program-link">${escapeHtml(item.program)}</span>`;
          const city = item.city ? `<span class="tag">${escapeHtml(item.city)}</span>` : "";
          const category = item.category ? `<span class="tag">${escapeHtml(item.category)}</span>` : "";
          const priority = item.priority ? `<span class="tag ${priorityClass(item.priority)}">${escapeHtml(item.priority)}</span>` : "";
          const note = item.note ? `<div class="note">${escapeHtml(item.note)}</div>` : "";

          return `
            <div class="notice-row ${item.status}">
              <span class="deadline-text ${item.status}">【报名截止：${escapeHtml(deadlineText(item))}】</span>
              ${link}
              <span class="meta">${category}${city}${priority}</span>
              ${note}
            </div>
          `;
        }).join("");

        return `
          <section class="school-section" id="${anchorId(school)}">
            <h2 class="school-heading">${escapeHtml(school)}<small>${items.length} 条</small></h2>
            <div class="notice-list">${list}</div>
          </section>
        `;
      }).join("");
    }

    function bindEvents() {
      els.search.addEventListener("input", (event) => {
        state.search = event.target.value;
        render();
      });

      els.category.addEventListener("change", (event) => {
        state.category = event.target.value;
        render();
      });

      els.sort.addEventListener("change", (event) => {
        state.sort = event.target.value;
        render();
      });

      els.statusButtons.addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (!button) return;
        state.status = button.dataset.filter;
        els.statusButtons.querySelectorAll("button").forEach((item) => item.classList.toggle("active", item === button));
        render();
      });
    }

    async function loadData() {
      const response = await fetch(`${DATA_FILE}?v=${Date.now()}`, { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}: 没有找到 ${DATA_FILE}`);
      const text = await response.text();
      if (!text.trim()) throw new Error(`${DATA_FILE} 是空文件`);
      if (text.trim().startsWith("<!DOCTYPE")) throw new Error(`${DATA_FILE} 返回的是网页，不是 CSV 文件`);
      return text;
    }

    async function init() {
      bindEvents();
      try {
        const csv = await loadData();
        state.records = normalize(parseCsv(csv));
        renderStats();
        renderCategories();
        render();
      } catch (error) {
        renderError(error.message || String(error));
      }
    }

    init();
  </script>
</body>
</html>
